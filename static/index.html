<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneDay - 오늘 딱 3개</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>OneDay</h1>
        <p>오늘 딱 필요한 일 1~3개만 끝내고, 저녁에 회고를 남겨요.</p>
        <a class="nav-link" href="./history.html">히스토리 보기</a>
      </header>

      <section id="carryoverCard" class="card" hidden>
        <h2>어제 미완료 항목</h2>
        <p id="carryoverText"></p>
        <ul id="carryoverList" class="todo-list"></ul>
        <div class="action-row">
          <button id="carryoverAddBtn" type="button">
            오늘 할 일에 추가하기
          </button>
          <button id="carryoverSkipBtn" class="secondary" type="button">
            추가 안 하기
          </button>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>오늘의 투두</h2>
          <span id="todoCount" class="badge">0 / 3</span>
        </div>

        <form id="todoForm" class="inline-form">
          <input
            id="todoInput"
            type="text"
            maxlength="120"
            placeholder="예: 발표 자료 1차 완성"
            required
          />
          <button type="submit">추가</button>
        </form>

        <ul id="todoList" class="todo-list"></ul>
      </section>

      <section class="card">
        <h2>오후 3시 이후 코칭</h2>
        <p id="timeGateNotice" class="time-note"></p>

        <div id="afternoonPanel" hidden>
          <form id="adviceForm" class="stack-form">
            <label for="adviceInput">AI에게 조언 받기</label>
            <textarea
              id="adviceInput"
              rows="3"
              maxlength="1000"
              placeholder="예: 남은 업무 우선순위를 어떻게 잡으면 좋을까?"
              required
            ></textarea>
            <button type="submit">조언 받기</button>
          </form>

          <div id="adviceResult" class="result" hidden>
            <h3>AI 조언</h3>
            <p id="adviceText"></p>
          </div>

          <form id="retrospectiveForm" class="stack-form">
            <label for="retrospectiveInput">회고하기</label>
            <textarea
              id="retrospectiveInput"
              rows="6"
              maxlength="2000"
              placeholder="오늘 무엇이 잘 되었고, 무엇이 어려웠는지 자유롭게 적어보세요."
              required
            ></textarea>
            <button type="submit">회고 조언 받기</button>
          </form>

          <div id="retrospectiveResult" class="result" hidden>
            <h3>AI 조언</h3>
            <p id="analysisText"></p>
            <h3>응원 메시지</h3>
            <p id="cheerText"></p>
          </div>
        </div>
      </section>

      <p id="notice" class="notice" aria-live="polite"></p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
