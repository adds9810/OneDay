<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneDay - 실행 히스토리</title>
    <link rel="stylesheet" href="./style.css?v=2" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>실행 히스토리</h1>
        <p>실행 계획 달성과 회고 작성 상태를 날짜별로 확인하세요.</p>
        <a class="nav-link" href="./index.html">홈으로 돌아가기</a>
      </header>

      <section class="card history-top">
        <div id="streakBox" class="streak-box">연속 달성 0일</div>
        <p class="time-note">
          완전 달성 기준: 당일 할 일 전체 완료 + 회고 작성
        </p>
        <div id="streakAdvice" class="result" hidden>
          <h3>AI 연속 달성 추천</h3>
          <p id="streakAdviceText" class="detail-text"></p>
          <p class="time-note">
            AI 추천은 참고용입니다. 실제 일정과 우선순위는 직접 판단해 주세요.
          </p>
        </div>
      </section>

      <section class="card">
        <h2>최근 실행 기록</h2>
        <ul id="historyList" class="history-list"></ul>
      </section>

      <p id="notice" class="notice" aria-live="polite"></p>
    </main>

    <script src="./history.js?v=2"></script>
  </body>
</html>
